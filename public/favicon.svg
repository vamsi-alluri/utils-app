<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <linearGradient id="tool-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg-gradient)"/>

  <!-- Document/PDF icon -->
  <g transform="translate(12, 14)">
    <rect x="0" y="0" width="14" height="18" rx="2" fill="white" opacity="0.95"/>
    <line x1="3" y1="4" x2="11" y2="4" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="3" y1="7" x2="11" y2="7" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="3" y1="10" x2="8" y2="10" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round"/>
    <!-- PDF text -->
    <text x="7" y="16" font-family="Arial, sans-serif" font-size="5" font-weight="bold" fill="#3B82F6" text-anchor="middle">PDF</text>
  </g>

  <!-- Image/Picture icon -->
  <g transform="translate(32, 14)">
    <rect x="0" y="0" width="14" height="18" rx="2" fill="white" opacity="0.95"/>
    <!-- Mountain/sun -->
    <circle cx="10" cy="5" r="2.5" fill="#FBBF24"/>
    <path d="M2 14 L5 9 L8 12 L11 8 L14 12 L14 14 Z" fill="#10B981"/>
  </g>

  <!-- Sparkle/AI icon (for JD Screener) -->
  <g transform="translate(22, 36)">
    <circle cx="10" cy="10" r="9" fill="url(#tool-gradient)"/>
    <!-- Sparkle shape -->
    <path d="M10 2 L12 8 L18 10 L12 12 L10 18 L8 12 L2 10 L8 8 Z" fill="white"/>
  </g>
</svg>
