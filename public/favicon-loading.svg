<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg-gradient-load" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg-gradient-load)"/>

  <!-- Loading spinner -->
  <g transform="translate(32, 32)">
    <circle cx="0" cy="0" r="16" fill="none" stroke="white" stroke-width="4" opacity="0.2"/>
    <path d="M0 -16 A 16 16 0 0 1 13.86 -8" fill="none" stroke="white" stroke-width="4" stroke-linecap="round">
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0 0 0"
        to="360 0 0"
        dur="1s"
        repeatCount="indefinite"/>
    </path>
  </g>
</svg>
